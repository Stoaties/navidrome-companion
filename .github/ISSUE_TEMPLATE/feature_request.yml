name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have a look at the **Roadmap / future ideas** section of the README
        first — your idea may already be planned.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that's hard or impossible today?
      placeholder: I want to re-sync a playlist without re-pasting the whole list...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How might it work? UI, behaviour, anything you've imagined.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've thought about.
  - type: checkboxes
    id: constraints
    attributes:
      label: Fit with the project
      options:
        - label: >
            This keeps things lightweight enough to run on a Raspberry Pi Zero 2W.
        - label: I'd be willing to help implement it.

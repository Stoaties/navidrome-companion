<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}navidrome-companion{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  {% if user %}
  <nav class="topbar">
    <span class="brand">♪ navidrome-companion</span>
    <div class="links">
      <a href="/">Dashboard</a>
      <a href="/navidrome/" target="_blank">Music library ↗</a>
      {% if is_admin %}<a href="/settings">Settings</a>{% endif %}
      <a href="/account">Account</a>
      <a href="/logout">Logout ({{ user }})</a>
    </div>
  </nav>
  {% endif %}
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
